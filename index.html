<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>厦大夜市地图</title>
  <style>
    :root {
      --blue: #39a7ff;
      --deep-blue: #0f6fae;
      --orange: #ff9f43;
      --yellow: #ffd166;
      --green: #06d6a0;
      --pink: #ff6b81;
      --bg: #f6fbff;
      --card: rgba(255, 255, 255, 0.92);
      --text: #263238;
      --muted: #6c7a89;
      --shadow: 0 10px 30px rgba(49, 128, 176, 0.14);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family:
        "PingFang SC",
        "Hiragino Sans GB",
        "Microsoft YaHei",
        "Noto Sans SC",
        system-ui,
        sans-serif;
      background:
        radial-gradient(circle at 10% 0%, rgba(255, 209, 102, 0.28), transparent 28%),
        radial-gradient(circle at 90% 10%, rgba(57, 167, 255, 0.27), transparent 28%),
        linear-gradient(180deg, #eaf8ff 0%, #fff8ed 100%);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    .app {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .hero {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      padding: 28px 22px;
      color: #fff;
      background:
        linear-gradient(135deg, rgba(20, 147, 224, 0.95), rgba(255, 159, 67, 0.95)),
        url("");
      box-shadow: var(--shadow);
      min-height: 190px;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      right: -60px;
      top: -60px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.18);
    }

    .hero::after {
      content: "🌊";
      position: absolute;
      right: 26px;
      bottom: 18px;
      font-size: 64px;
      opacity: 0.22;
    }

    .hero h1 {
      font-size: clamp(30px, 7vw, 52px);
      letter-spacing: 1px;
      font-weight: 900;
      line-height: 1.05;
      text-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      position: relative;
      z-index: 1;
    }

    .hero p {
      margin-top: 12px;
      font-size: 15px;
      line-height: 1.7;
      max-width: 660px;
      opacity: 0.96;
      position: relative;
      z-index: 1;
    }

    .hero-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 18px;
      position: relative;
      z-index: 1;
    }

    .hero-tag {
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(8px);
      font-size: 13px;
    }

    .toolbar {
      margin-top: 18px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr 0.8fr auto;
      gap: 10px;
      align-items: center;
    }

    .input,
    .select {
      border: none;
      outline: none;
      border-radius: 18px;
      padding: 14px 15px;
      background: var(--card);
      box-shadow: var(--shadow);
      color: var(--text);
      font-size: 14px;
      width: 100%;
    }

    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 18px;
      padding: 14px 16px;
      font-weight: 800;
      color: #fff;
      background: linear-gradient(135deg, var(--orange), #ff6b3d);
      box-shadow: 0 10px 20px rgba(255, 159, 67, 0.28);
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(255, 159, 67, 0.36);
    }

    .btn.secondary {
      color: var(--deep-blue);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .main {
      margin-top: 20px;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 18px;
      align-items: start;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 12px;
    }

    .section-title h2 {
      font-size: 22px;
      font-weight: 900;
      color: #1d4d69;
    }

    .section-title span {
      color: var(--muted);
      font-size: 13px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: 0.2s ease;
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .card:hover {
      transform: translateY(-3px);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .emoji {
      width: 52px;
      height: 52px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff0c2, #dff6ff);
      font-size: 27px;
    }

    .card h3 {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 5px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .rating {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
    }

    .stars {
      color: #ffb703;
      letter-spacing: 1px;
    }

    .card-desc {
      margin-top: 10px;
      color: #40525d;
      font-size: 13px;
      line-height: 1.65;
      min-height: 42px;
    }

    .card-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
    }

    .small-btn {
      border: none;
      cursor: pointer;
      padding: 9px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 800;
      background: #ecf8ff;
      color: var(--deep-blue);
      flex: 1;
    }

    .small-btn.hot {
      background: linear-gradient(135deg, var(--blue), #4cc9f0);
      color: #fff;
    }

    .map-panel {
      position: sticky;
      top: 16px;
      background: rgba(255, 255, 255, 0.88);
      border-radius: 28px;
      padding: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .fake-map {
      position: relative;
      height: 360px;
      border-radius: 24px;
      overflow: hidden;
      background:
        linear-gradient(135deg, rgba(57, 167, 255, 0.16), rgba(255, 209, 102, 0.22)),
        repeating-linear-gradient(45deg, rgba(57,167,255,0.08) 0 8px, transparent 8px 18px);
      border: 1px solid rgba(57,167,255,0.18);
    }

    .sea {
      position: absolute;
      right: -40px;
      bottom: -50px;
      width: 210px;
      height: 210px;
      background: rgba(57, 167, 255, 0.36);
      border-radius: 50%;
      box-shadow:
        -26px -8px 0 rgba(57, 167, 255, 0.18),
        -52px -18px 0 rgba(57, 167, 255, 0.12);
    }

    .xmu {
      position: absolute;
      left: 22px;
      top: 22px;
      padding: 8px 11px;
      background: #fff;
      border-radius: 999px;
      font-size: 12px;
      color: var(--deep-blue);
      box-shadow: var(--shadow);
      font-weight: 900;
    }

    .road {
      position: absolute;
      height: 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      transform-origin: left center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .r1 { width: 260px; left: 48px; top: 135px; transform: rotate(8deg); }
    .r2 { width: 220px; left: 88px; top: 220px; transform: rotate(-22deg); }
    .r3 { width: 190px; left: 120px; top: 70px; transform: rotate(38deg); }

    .marker {
      position: absolute;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 50% 50% 50% 10px;
      transform: rotate(-45deg);
      background: linear-gradient(135deg, var(--orange), var(--pink));
      color: #fff;
      font-size: 20px;
      box-shadow: 0 10px 18px rgba(255, 107, 129, 0.28);
      cursor: pointer;
      transition: 0.2s;
    }

    .marker span {
      transform: rotate(45deg);
    }

    .marker.active {
      background: linear-gradient(135deg, var(--blue), var(--green));
      transform: rotate(-45deg) scale(1.15);
      z-index: 5;
    }

    .map-tip {
      margin-top: 12px;
      padding: 12px;
      background: #f8fcff;
      border-radius: 18px;
      font-size: 13px;
      color: #426274;
      line-height: 1.6;
    }

    .detail-mask {
      position: fixed;
      inset: 0;
      background: rgba(15, 33, 45, 0.45);
      backdrop-filter: blur(8px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 20;
      padding: 18px;
    }

    .detail-mask.show {
      display: flex;
    }

    .sheet {
      width: min(720px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border-radius: 28px;
      padding: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      animation: up 0.2s ease;
    }

    @keyframes up {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .sheet-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
    }

    .sheet h2 {
      font-size: 24px;
      margin-bottom: 6px;
    }

    .close {
      border: none;
      background: #f1f5f9;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
    }

    .comment-list {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .comment {
      background: #f8fbff;
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.6;
    }

    .comment strong {
      color: var(--deep-blue);
    }

    .review-box {
      margin-top: 18px;
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff8e6, #eaf8ff);
    }

    .star-picker {
      display: flex;
      gap: 6px;
      margin: 10px 0;
      font-size: 28px;
    }

    .star-picker button {
      border: none;
      background: transparent;
      cursor: pointer;
      color: #cbd5e1;
      font-size: 28px;
    }

    .star-picker button.active {
      color: #ffb703;
    }

    textarea,
    .form input,
    .form select {
      width: 100%;
      border: none;
      outline: none;
      border-radius: 14px;
      background: #fff;
      padding: 13px;
      margin-top: 9px;
      box-shadow: inset 0 0 0 1px #e7edf3;
      font-family: inherit;
      font-size: 14px;
    }

    textarea {
      min-height: 86px;
      resize: vertical;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.8);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
    }

    .bottom-nav {
      display: none;
      position: fixed;
      left: 14px;
      right: 14px;
      bottom: 12px;
      z-index: 10;
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
      grid-template-columns: repeat(3, 1fr);
    }

    .bottom-nav button {
      border: none;
      background: transparent;
      padding: 12px 4px;
      font-size: 12px;
      color: #46616f;
      font-weight: 800;
    }

    .bottom-nav button.active {
      color: var(--orange);
      background: #fff4dd;
    }

    @media (max-width: 860px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
      }

      .toolbar .input {
        grid-column: 1 / -1;
      }

      .main {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: 1fr;
      }

      .map-panel {
        position: static;
      }

      .desktop-map {
        display: none;
      }

      .bottom-nav {
        display: grid;
      }

      .mobile-hidden {
        display: none !important;
      }

      .fake-map {
        height: 330px;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 12px;
      }

      .hero {
        min-height: 210px;
        padding: 24px 18px;
        border-radius: 26px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .card-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <section class="hero">
      <h1>厦大夜市地图</h1>
      <p>
        给厦大学生的周边小摊贩评价与导航平台。下课后、晚自习后、海边散步后，
        找一口热乎的夜宵，也给摊主留下一颗星星。
      </p>
      <div class="hero-tags">
        <span class="hero-tag">🌙 夜宵雷达</span>
        <span class="hero-tag">📍 一键导航</span>
        <span class="hero-tag">⭐ 学生真实评价</span>
        <span class="hero-tag">🌊 白城海风味</span>
      </div>
    </section>

    <section class="toolbar">
      <input id="searchInput" class="input" placeholder="搜索摊位、地点、口味，例如：烤冷面 / 白城 / 便宜" />
      <select id="categorySelect" class="select">
        <option value="all">全部类型</option>
        <option value="主食">主食</option>
        <option value="饮品">饮品</option>
        <option value="甜品">甜品</option>
        <option value="烧烤">烧烤</option>
        <option value="小吃">小吃</option>
      </select>
      <select id="sortSelect" class="select">
        <option value="hot">按推荐排序</option>
        <option value="rating">按评分排序</option>
        <option value="price">按人均价格排序</option>
      </select>
      <button class="btn" id="addBtn">＋ 添加摊位</button>
    </section>

    <main class="main">
      <section id="listSection">
        <div class="section-title">
          <h2>今晚吃什么</h2>
          <span id="countText">0 个摊位</span>
        </div>
        <div class="cards" id="cards"></div>
      </section>

      <aside id="mapSection" class="map-panel desktop-map">
        <div class="section-title">
          <h2>周边小地图</h2>
          <span>点击图钉查看</span>
        </div>
        <div class="fake-map" id="fakeMap">
          <div class="sea"></div>
          <div class="xmu">厦门大学</div>
          <div class="road r1"></div>
          <div class="road r2"></div>
          <div class="road r3"></div>
        </div>
        <div class="map-tip" id="mapTip">
          这里是模拟地图。点击摊位卡片或地图图钉，可以查看评价并打开手机地图导航。
        </div>
      </aside>
    </main>
  </div>

  <nav class="bottom-nav">
    <button class="active" data-target="list">🍜 摊位</button>
    <button data-target="map">🗺 地图</button>
    <button data-target="add">＋ 添加</button>
  </nav>

  <div class="detail-mask" id="detailMask">
    <div class="sheet" id="detailSheet"></div>
  </div>

  <script>
    const STORAGE_KEY = "xmu_night_market_map_v1";

    const seedVendors = [
      {
        id: crypto.randomUUID(),
        name: "芙蓉隧道口烤冷面",
        category: "主食",
        emoji: "🥙",
        location: "芙蓉隧道口附近",
        price: 12,
        desc: "酸甜口很稳，晚自习后排队也值得。适合加蛋加肠，热乎乎很治愈。",
        lng: 118.1039,
        lat: 24.4379,
        mapX: 30,
        mapY: 38,
        reviews: [
          { name: "海韵打工人", rating: 5, text: "加蛋真的香，赶论文的时候靠它续命。" },
          { name: "芙蓉湖边散步者", rating: 4, text: "味道不错，稍微有点排队。" }
        ]
      },
      {
        id: crypto.randomUUID(),
        name: "白城沙滩冰粉摊",
        category: "甜品",
        emoji: "🍧",
        location: "白城沙滩入口",
        price: 10,
        desc: "海风、沙滩、冰粉，是厦门夜晚的限定快乐。红糖味比较推荐。",
        lng: 118.0987,
        lat: 24.4328,
        mapX: 72,
        mapY: 72,
        reviews: [
          { name: "白城看海bot", rating: 5, text: "吹着海风吃冰粉，非常厦门。" }
        ]
      },
      {
        id: crypto.randomUUID(),
        name: "西村阿姨沙茶面",
        category: "主食",
        emoji: "🍜",
        location: "厦大西村门口",
        price: 18,
        desc: "汤底浓，配料选择多。适合想吃点正经夜宵的时候。",
        lng: 118.1065,
        lat: 24.4415,
        mapX: 42,
        mapY: 24,
        reviews: [
          { name: "法学院夜归人", rating: 4, text: "沙茶汤很浓，价格还可以。" }
        ]
      },
      {
        id: crypto.randomUUID(),
        name: "顶澳仔猫街烤肠",
        category: "烧烤",
        emoji: "🌭",
        location: "顶澳仔猫街",
        price: 8,
        desc: "路过很难不买。外皮脆，适合边走边吃。",
        lng: 118.1122,
        lat: 24.4432,
        mapX: 66,
        mapY: 30,
        reviews: [
          { name: "猫街常驻选手", rating: 5, text: "便宜快乐，适合饭后散步来一根。" }
        ]
      },
      {
        id: crypto.randomUUID(),
        name: "演武路柠檬茶小车",
        category: "饮品",
        emoji: "🍋",
        location: "演武路公交站旁",
        price: 13,
        desc: "清爽不腻，适合夏天。半糖比较刚好。",
        lng: 118.1008,
        lat: 24.4358,
        mapX: 54,
        mapY: 55,
        reviews: [
          { name: "图书馆逃离者", rating: 4, text: "半糖好喝，晚上来一杯很清醒。" }
        ]
      },
      {
        id: crypto.randomUUID(),
        name: "南普陀素卷小摊",
        category: "小吃",
        emoji: "🥟",
        location: "南普陀附近",
        price: 9,
        desc: "清淡但有味道，适合不想吃太油的时候。",
        lng: 118.1098,
        lat: 24.4448,
        mapX: 78,
        mapY: 18,
        reviews: [
          { name: "早八幸存者", rating: 4, text: "很适合宵夜想吃轻一点的时候。" }
        ]
      }
    ];

    let state = loadState();
    let currentRating = 5;
    let selectedVendorId = null;

    function loadState() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seedVendors));
        return seedVendors;
      }
      try {
        return JSON.parse(raw);
      } catch {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(seedVendors));
        return seedVendors;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function avgRating(vendor) {
      if (!vendor.reviews || vendor.reviews.length === 0) return 0;
      const sum = vendor.reviews.reduce((a, r) => a + Number(r.rating), 0);
      return sum / vendor.reviews.length;
    }

    function starText(num) {
      const rounded = Math.round(num);
      return "★★★★★".slice(0, rounded) + "☆☆☆☆☆".slice(0, 5 - rounded);
    }

    function getFilteredVendors() {
      const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
      const category = document.getElementById("categorySelect").value;
      const sort = document.getElementById("sortSelect").value;

      let list = state.filter(v => {
        const text = `${v.name} ${v.category} ${v.location} ${v.desc}`.toLowerCase();
        const matchKeyword = !keyword || text.includes(keyword);
        const matchCategory = category === "all" || v.category === category;
        return matchKeyword && matchCategory;
      });

      if (sort === "rating") {
        list.sort((a, b) => avgRating(b) - avgRating(a));
      } else if (sort === "price") {
        list.sort((a, b) => a.price - b.price);
      } else {
        list.sort((a, b) => {
          const scoreA = avgRating(a) * 2 + (a.reviews?.length || 0);
          const scoreB = avgRating(b) * 2 + (b.reviews?.length || 0);
          return scoreB - scoreA;
        });
      }

      return list;
    }

    function renderCards() {
      const list = getFilteredVendors();
      const cards = document.getElementById("cards");
      document.getElementById("countText").textContent = `${list.length} 个摊位`;

      if (list.length === 0) {
        cards.innerHTML = `<div class="empty">暂时没有找到相关摊位。换个关键词试试，或者自己添加一个吧！</div>`;
        renderMarkers(list);
        return;
      }

      cards.innerHTML = list.map(v => {
        const rating = avgRating(v);
        return `
          <article class="card">
            <div class="card-top">
              <div class="emoji">${v.emoji}</div>
              <div>
                <h3>${escapeHtml(v.name)}</h3>
                <div class="meta">📍 ${escapeHtml(v.location)} · ${escapeHtml(v.category)} · 人均 ¥${v.price}</div>
              </div>
            </div>
            <div class="rating">
              <span class="stars">${starText(rating || 5)}</span>
              <span>${rating ? rating.toFixed(1) : "暂无"} 分 · ${v.reviews?.length || 0} 条评价</span>
            </div>
            <p class="card-desc">${escapeHtml(v.desc)}</p>
            <div class="card-actions">
              <button class="small-btn hot" onclick="openDetail('${v.id}')">查看评价</button>
              <button class="small-btn" onclick="openNav('${v.id}')">去这里</button>
            </div>
          </article>
        `;
      }).join("");

      renderMarkers(list);
    }

    function renderMarkers(list) {
      const map = document.getElementById("fakeMap");
      if (!map) return;

      map.querySelectorAll(".marker").forEach(m => m.remove());

      list.forEach(v => {
        const marker = document.createElement("button");
        marker.className = "marker" + (v.id === selectedVendorId ? " active" : "");
        marker.style.left = `${v.mapX || 50}%`;
        marker.style.top = `${v.mapY || 50}%`;
        marker.innerHTML = `<span>${v.emoji}</span>`;
        marker.title = v.name;
        marker.onclick = () => {
          selectedVendorId = v.id;
          document.getElementById("mapTip").innerHTML =
            `<strong>${escapeHtml(v.name)}</strong><br>
             ${escapeHtml(v.location)} · ${escapeHtml(v.category)} · 人均 ¥${v.price}<br>
             <button class="small-btn hot" style="margin-top:8px;" onclick="openDetail('${v.id}')">查看详情</button>`;
          renderMarkers(list);
        };
        map.appendChild(marker);
      });
    }

    function openDetail(id) {
      const vendor = state.find(v => v.id === id);
      if (!vendor) return;
      selectedVendorId = id;
      currentRating = 5;

      const rating = avgRating(vendor);
      const comments = vendor.reviews?.length
        ? vendor.reviews.map(r => `
            <div class="comment">
              <strong>${escapeHtml(r.name || "匿名同学")}</strong>
              <span class="stars">${starText(r.rating)}</span>
              <div>${escapeHtml(r.text)}</div>
            </div>
          `).join("")
        : `<div class="comment">还没有评价，成为第一个推荐它的人吧！</div>`;

      document.getElementById("detailSheet").innerHTML = `
        <div class="sheet-head">
          <div>
            <h2>${vendor.emoji} ${escapeHtml(vendor.name)}</h2>
            <div class="meta">📍 ${escapeHtml(vendor.location)} · ${escapeHtml(vendor.category)} · 人均 ¥${vendor.price}</div>
            <div class="rating">
              <span class="stars">${starText(rating || 5)}</span>
              <span>${rating ? rating.toFixed(1) : "暂无"} 分 · ${vendor.reviews?.length || 0} 条评价</span>
            </div>
          </div>
          <button class="close" onclick="closeDetail()">×</button>
        </div>

        <p class="card-desc" style="font-size:14px;margin-top:14px;">${escapeHtml(vendor.desc)}</p>

        <div class="card-actions">
          <button class="small-btn hot" onclick="openNav('${vendor.id}')">打开地图导航</button>
          <button class="small-btn" onclick="deleteVendor('${vendor.id}')">删除摊位</button>
        </div>

        <div class="review-box">
          <strong>给它打个分</strong>
          <div class="star-picker" id="starPicker">
            ${[1,2,3,4,5].map(n => `<button class="${n <= 5 ? "active" : ""}" onclick="setRating(${n})">★</button>`).join("")}
          </div>
          <input id="reviewName" placeholder="你的昵称，例如：翔安赶海人" />
          <textarea id="reviewText" placeholder="写点评价吧：口味、价格、排队情况、推荐搭配……"></textarea>
          <button class="btn" style="margin-top:10px;width:100%;" onclick="submitReview('${vendor.id}')">提交评价</button>
        </div>

        <div class="comment-list">
          ${comments}
        </div>
      `;

      document.getElementById("detailMask").classList.add("show");
      renderCards();
    }

    function closeDetail() {
      document.getElementById("detailMask").classList.remove("show");
    }

    function setRating(n) {
      currentRating = n;
      document.querySelectorAll("#starPicker button").forEach((btn, idx) => {
        btn.classList.toggle("active", idx < n);
      });
    }

    function submitReview(id) {
      const vendor = state.find(v => v.id === id);
      if (!vendor) return;

      const name = document.getElementById("reviewName").value.trim() || "匿名同学";
      const text = document.getElementById("reviewText").value.trim();

      if (!text) {
        alert("先写一点评价吧！");
        return;
      }

      vendor.reviews = vendor.reviews || [];
      vendor.reviews.unshift({
        name,
        rating: currentRating,
        text
      });

      saveState();
      openDetail(id);
    }

    function openNav(id) {
      const vendor = state.find(v => v.id === id);
      if (!vendor) return;

      const url = `https://uri.amap.com/navigation?to=${vendor.lng},${vendor.lat},${encodeURIComponent(vendor.name)}&mode=walk&src=xmu-night-market&coordinate=gaode`;
      window.open(url, "_blank");
    }

    function openAddSheet() {
      currentRating = 5;
      document.getElementById("detailSheet").innerHTML = `
        <div class="sheet-head">
          <div>
            <h2>＋ 添加一个宝藏摊位</h2>
            <div class="meta">把你私藏的厦大周边夜宵点分享给同学们</div>
          </div>
          <button class="close" onclick="closeDetail()">×</button>
        </div>

        <div class="review-box form">
          <div class="form-grid">
            <input id="newName" placeholder="摊位名称，例如：西村炸串小车" />
            <select id="newCategory">
              <option value="主食">主食</option>
              <option value="饮品">饮品</option>
              <option value="甜品">甜品</option>
              <option value="烧烤">烧烤</option>
              <option value="小吃">小吃</option>
            </select>
          </div>

          <div class="form-grid">
            <input id="newLocation" placeholder="位置，例如：厦大西村门口" />
            <input id="newPrice" type="number" placeholder="人均价格，例如：15" />
          </div>

          <div class="form-grid">
            <input id="newEmoji" placeholder="图标，例如：🍢" />
            <input id="newLngLat" placeholder="经纬度，可不填，例如：118.10,24.43" />
          </div>

          <textarea id="newDesc" placeholder="推荐理由：味道、价格、营业时间、适合什么场景……"></textarea>

          <button class="btn" style="margin-top:12px;width:100%;" onclick="submitNewVendor()">保存摊位</button>
        </div>
      `;
      document.getElementById("detailMask").classList.add("show");
    }

    function submitNewVendor() {
      const name = document.getElementById("newName").value.trim();
      const category = document.getElementById("newCategory").value;
      const location = document.getElementById("newLocation").value.trim();
      const price = Number(document.getElementById("newPrice").value || 0);
      const emoji = document.getElementById("newEmoji").value.trim() || "🍢";
      const desc = document.getElementById("newDesc").value.trim();
      const lngLat = document.getElementById("newLngLat").value.trim();

      if (!name || !location || !desc) {
        alert("名称、位置和推荐理由不能为空哦！");
        return;
      }

      let lng = 118.103;
      let lat = 24.438;

      if (lngLat && lngLat.includes(",")) {
        const arr = lngLat.split(",").map(Number);
        if (!Number.isNaN(arr[0]) && !Number.isNaN(arr[1])) {
          lng = arr[0];
          lat = arr[1];
        }
      }

      const vendor = {
        id: crypto.randomUUID(),
        name,
        category,
        emoji,
        location,
        price: price || 10,
        desc,
        lng,
        lat,
        mapX: Math.floor(20 + Math.random() * 65),
        mapY: Math.floor(18 + Math.random() * 62),
        reviews: []
      };

      state.unshift(vendor);
      saveState();
      closeDetail();
      renderCards();
    }

    function deleteVendor(id) {
      if (!confirm("确定删除这个摊位吗？本地数据会同步删除。")) return;
      state = state.filter(v => v.id !== id);
      saveState();
      closeDetail();
      renderCards();
    }

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    document.getElementById("searchInput").addEventListener("input", renderCards);
    document.getElementById("categorySelect").addEventListener("change", renderCards);
    document.getElementById("sortSelect").addEventListener("change", renderCards);
    document.getElementById("addBtn").addEventListener("click", openAddSheet);

    document.getElementById("detailMask").addEventListener("click", e => {
      if (e.target.id === "detailMask") closeDetail();
    });

    document.querySelectorAll(".bottom-nav button").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".bottom-nav button").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        const target = btn.dataset.target;

        if (target === "list") {
          document.getElementById("listSection").scrollIntoView({ behavior: "smooth" });
        }

        if (target === "map") {
          showMobileMap();
        }

        if (target === "add") {
          openAddSheet();
        }
      });
    });

    function showMobileMap() {
      const oldMobileMap = document.getElementById("mobileMapPanel");
      if (oldMobileMap) oldMobileMap.remove();

      const panel = document.createElement("aside");
      panel.id = "mobileMapPanel";
      panel.className = "map-panel";
      panel.style.marginTop = "18px";
      panel.innerHTML = `
        <div class="section-title">
          <h2>周边小地图</h2>
          <span>点击图钉查看</span>
        </div>
        <div class="fake-map" id="fakeMapMobile">
          <div class="sea"></div>
          <div class="xmu">厦门大学</div>
          <div class="road r1"></div>
          <div class="road r2"></div>
          <div class="road r3"></div>
        </div>
        <div class="map-tip" id="mapTipMobile">
          点击摊位图钉，查看推荐信息。
        </div>
      `;

      document.querySelector(".main").appendChild(panel);

      const originalMap = document.getElementById("fakeMap");
      const mobileMap = document.getElementById("fakeMapMobile");

      getFilteredVendors().forEach(v => {
        const marker = document.createElement("button");
        marker.className = "marker";
        marker.style.left = `${v.mapX || 50}%`;
        marker.style.top = `${v.mapY || 50}%`;
        marker.innerHTML = `<span>${v.emoji}</span>`;
        marker.onclick = () => {
          document.getElementById("mapTipMobile").innerHTML =
            `<strong>${escapeHtml(v.name)}</strong><br>
             ${escapeHtml(v.location)} · ${escapeHtml(v.category)} · 人均 ¥${v.price}<br>
             <button class="small-btn hot" style="margin-top:8px;" onclick="openDetail('${v.id}')">查看详情</button>`;
        };
        mobileMap.appendChild(marker);
      });

      panel.scrollIntoView({ behavior: "smooth" });
    }

    renderCards();
  </script>
</body>
</html>
